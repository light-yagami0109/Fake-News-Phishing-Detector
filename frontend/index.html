<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fraud Detector | Fake News & Phishing</title>
    
    <!-- External Libraries (CDNs) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg custom-navbar shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-shield-alt text-primary"></i> AI Fraud Detector</a>
            <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- Main Dashboard -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <!-- Tab Buttons -->
                <div class="d-flex justify-content-center mb-4">
                    <button id="btn-news" class="btn btn-primary mx-2 px-4 shadow-sm active-tab">Fake News</button>
                    <button id="btn-url" class="btn btn-outline-primary mx-2 px-4 shadow-sm">Phishing URL</button>
                </div>

                <!-- Fake News Input Card -->
                <div id="news-section" class="card shadow-lg border-0 rounded-4 feature-card">
                    <div class="card-body p-4">
                        <h4 class="mb-3"><i class="fas fa-newspaper"></i> Analyze News Article</h4>
                        <textarea id="news-input" class="form-control mb-3 custom-input" rows="6" placeholder="Paste the news article text here..."></textarea>
                        <button id="submit-news" class="btn btn-primary w-100 py-2 fw-bold">Analyze Text</button>
                    </div>
                </div>

                <!-- Phishing URL Input Card (Hidden by default) -->
                <div id="url-section" class="card shadow-lg border-0 rounded-4 feature-card d-none">
                    <div class="card-body p-4">
                        <h4 class="mb-3"><i class="fas fa-link"></i> Scan Website URL</h4>
                        <input type="url" id="url-input" class="form-control mb-3 custom-input py-3" placeholder="https://example.com/login">
                        <button id="submit-url" class="btn btn-primary w-100 py-2 fw-bold">Scan Link</button>
                    </div>
                </div>

                <!-- Loading Spinner (Hidden by default) -->
                <div id="loading-spinner" class="text-center mt-5 d-none">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
                    <p class="mt-3 fw-bold text-muted">AI is analyzing...</p>
                </div>

                <!-- Results Section (Hidden by default) -->
                <div id="result-section" class="card shadow-lg border-0 rounded-4 mt-4 d-none">
                    <div class="card-body p-4 text-center">
                        <h3 id="result-title" class="fw-bold mb-2">Result</h3>
                        <p id="result-explanation" class="text-muted mb-4">Explanation will appear here.</p>
                        
                        <!-- Chart container -->
                        <div class="chart-container" style="position: relative; height:300px; width:100%">
                            <canvas id="confidenceChart"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-5 py-4 text-muted">
        <small>© 2026 AI Fraud Detector Project. Built with Flask & scikit-learn.</small>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
